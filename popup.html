<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 260px;
      padding: 14px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      background: #1a1a2e;
      color: #e0e0e0;
    }
    h2 {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 10px;
      color: #fff;
    }
    .status {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 10px;
      background: #16213e;
      border-radius: 6px;
      margin-bottom: 10px;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot-active { background: #4caf50; }
    .dot-inactive { background: #666; }
    button {
      width: 100%;
      padding: 8px;
      background: #0f3460;
      color: #e0e0e0;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
    }
    button:hover { background: #1a508b; }
    .info { font-size: 11px; color: #888; margin-top: 8px; text-align: center; }
  </style>
</head>
<body>
  <h2>IGXE Price Helper</h2>
  <div class="status">
    <span class="dot" id="statusDot" style="width:8px;height:8px;border-radius:50%;flex-shrink:0;"></span>
    <span id="statusText">未检测到库存页</span>
  </div>
  <button id="refreshBtn">重新获取价格</button>
  <div class="info">在库存页自动显示 Steam 参考价<br>和自动发货最低价</div>

  <script src="popup.js"></script>
</body>
</html>
